<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trustay Real-time Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        #chat-box { border: 1px solid #ddd; height: 400px; overflow-y: scroll; padding: 15px; background: #f9f9f9; display: flex; flex-direction: column; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 70%; word-break: break-all; }
        .mine { align-self: flex-end; background-color: #ffe812; color: #333; } /* 내 메시지: 카톡 노란색 */
        .others { align-self: flex-start; background-color: #fff; border: 1px solid #ccc; } /* 상대방: 흰색 */
        .system { align-self: center; font-size: 12px; color: #888; }
        .chat-img { max-width: 220px; max-height: 220px; border-radius: 8px; display: block; margin-top: 4px; cursor: pointer; }
        .input-row { display: flex; gap: 6px; align-items: center; margin-top: 10px; }
        .input-row input[type=text] { flex: 1; padding: 6px 8px; }
        .input-row button { padding: 6px 12px; }
    </style>
</head>
<body>
<h2>Trustay 실시간 채팅 테스트</h2>
<div style="margin-bottom: 10px;">
    <input type="number" id="roomId" placeholder="Room ID (방 번호)">
    <input type="number" id="senderId" placeholder="My ID (내 회원번호)">
    <button onclick="connect()" id="connect-btn">1. 연결 및 구독</button>
</div>

<div id="chat-box">
    <div class="system">먼저 연결 버튼을 눌러주세요.</div>
</div>

<div class="input-row">
    <input type="text" id="messageInput" placeholder="메시지 내용">
    <button onclick="sendMessage()" id="send-btn" disabled>2. 전송</button>
</div>

<div class="input-row">
    <input type="file" id="imageInput" accept="image/jpeg,image/png,image/heic,image/heif">
    <button onclick="sendImage()" id="image-btn" disabled>3. 이미지 전송</button>
    <span id="image-status" style="color:#888; font-size: 12px;"></span>
</div>

<script>
    var stompClient = null;
    // 채팅방 생성/이미지 업로드 등 REST 호출용 base URL.
    // 같은 도메인에서 페이지를 열었다면 window.location.origin 을 그대로 쓰면 됩니다.
    var API_BASE = window.location.origin && window.location.origin !== "null"
        ? window.location.origin
        : "http://trustay.mirim-it-show.site:8080";

    function connect() {
        var roomId = document.getElementById('roomId').value;
        var senderId = document.getElementById('senderId').value;

        if(!roomId || !senderId) {
            alert("Room ID와 My ID를 입력해주세요.");
            return;
        }

        var socket = new SockJS(API_BASE + '/ws-stomp');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('연결됨: ' + frame);
            document.getElementById('connect-btn').innerText = "연결 완료";
            document.getElementById('connect-btn').disabled = true;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('image-btn').disabled = false;

            // [핵심] 해당 채팅방 경로를 구독하여 실시간으로 메시지를 수신
            stompClient.subscribe('/sub/chat/room/' + roomId, function (response) {
                var messageData = JSON.parse(response.body);
                renderMessage(messageData);
            });

            var chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += '<div class="system">채팅방(' + roomId + ')에 연결되었습니다.</div>';
        });
    }

    function sendMessage() {
        var roomId = document.getElementById('roomId').value;
        var senderId = document.getElementById('senderId').value;
        var message = document.getElementById('messageInput').value;

        if (!message) return;

        // 서버의 @MessageMapping("/chat/send")로 발송
        stompClient.send("/pub/chat/send", {}, JSON.stringify({
            'roomId': roomId,
            'senderId': senderId,
            'message': message,
            'messageType': 'TEXT'
        }));

        document.getElementById('messageInput').value = '';
    }

    function sendImage() {
        var roomId = document.getElementById('roomId').value;
        var senderId = document.getElementById('senderId').value;
        var fileInput = document.getElementById('imageInput');
        var statusEl = document.getElementById('image-status');

        if (!roomId || !senderId) {
            alert("Room ID와 My ID를 입력해주세요.");
            return;
        }
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("이미지를 선택해주세요.");
            return;
        }

        var formData = new FormData();
        formData.append('image', fileInput.files[0]);

        statusEl.innerText = '업로드 중...';
        document.getElementById('image-btn').disabled = true;

        // REST 엔드포인트: POST /api/chat/room/{roomId}/image?senderId=...
        // 응답과 동시에 서버가 /sub/chat/room/{roomId} 로 브로드캐스트 하므로
        // 별도로 화면에 그릴 필요 없이 STOMP 구독 콜백에서 자동 렌더됩니다.
        fetch(API_BASE + '/api/chat/room/' + roomId + '/image?senderId=' + senderId, {
            method: 'POST',
            body: formData
        }).then(function (resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
        }).then(function (json) {
            statusEl.innerText = '전송 완료';
            fileInput.value = '';
        }).catch(function (err) {
            console.error(err);
            statusEl.innerText = '전송 실패: ' + err.message;
        }).finally(function () {
            document.getElementById('image-btn').disabled = false;
        });
    }

    function escapeHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderMessage(res) {
        var chatBox = document.getElementById('chat-box');
        var myId = document.getElementById('senderId').value;

        // 내 메시지인지 상대방 메시지인지 구분하여 클래스 부여
        var isMine = res.senderId == myId;
        var className = isMine ? 'mine' : 'others';

        var body;
        if (res.messageType === 'IMAGE') {
            // 메시지 본문이 이미지 URL
            body = '<img class="chat-img" src="' + escapeHtml(res.message) + '" ' +
                   'alt="image" onclick="window.open(this.src, \'_blank\')">';
        } else if (res.messageType === 'CONTRACT') {
            body = '<a href="' + escapeHtml(res.message) + '" target="_blank">[계약서 PDF 보기]</a>';
        } else {
            body = escapeHtml(res.message);
        }

        var msgHtml = '<div class="message ' + className + '">' +
            '<strong>' + escapeHtml(res.senderName) + '</strong><br>' +
            body +
            '</div>';

        chatBox.innerHTML += msgHtml;
        chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 하단 이동
    }

    // 엔터키 전송 이벤트
    document.getElementById("messageInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") sendMessage();
    });
</script>
</body>
</html>
